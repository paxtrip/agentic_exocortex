version: '3.8'

# Unified RAG System - Production Deployment
# Integrates with existing Traefik setup using traefik_network
# Services: api.${DOMAIN_NAME}, qd.${DOMAIN_NAME}, siyuan.${DOMAIN_NAME}

services:
  # SiYuan knowledge base
  siyuan:
    image: b3log/siyuan:latest
    container_name: unified-rag-siyuan
    ports:
      - "6806:6806"
    volumes:
      - siyuan_data:/opt/siyuan/workspace
    env_file:
      - ../.env
    environment:
      - SIYUAN_ACCESS_AUTH_CODE=${SIYUAN_AUTH_CODE}
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.siyuan.rule=Host(`siyuan.${DOMAIN_NAME:-localhost}`)"
      - "traefik.http.routers.siyuan.entrypoints=websecure"
      - "traefik.http.routers.siyuan.tls.certresolver=letsencrypt"
      - "traefik.http.services.siyuan.loadbalancer.server.port=6806"
    restart: unless-stopped

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: unified-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    env_file:
      - ../.env
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qdrant.rule=Host(`qd.${DOMAIN_NAME:-localhost}`)"
      - "traefik.http.routers.qdrant.entrypoints=websecure"
      - "traefik.http.routers.qdrant.tls.certresolver=letsencrypt"
      - "traefik.http.services.qdrant.loadbalancer.server.port=6333"
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: unified-rag-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - SIYUAN_URL=http://siyuan:6806
      - SQLITE_PATH=/app/data/knowledge.db
    volumes:
      - backend_data:/app/data
    depends_on:
      - qdrant
      - siyuan
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN_NAME:-localhost}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    restart: unless-stopped

volumes:
  siyuan_data:
  qdrant_data:
  backend_data:

networks:
  traefik_network:
    external: true
    name: traefik_network
