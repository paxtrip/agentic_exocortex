groups:
  - name: rag-system-alerts
    rules:
      - alert: RAGAPIHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on RAG API"
          description: "Error rate is {{ $value }}% (5% threshold)"

      - alert: RAGAPIDown
        expr: up{job="rag-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RAG API is down"
          description: "RAG API has been down for more than 2 minutes"

      - alert: QdrantDown
        expr: up{job="qdrant"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Qdrant vector database is down"
          description: "Qdrant has been down for more than 5 minutes"

      - alert: SiYuanDown
        expr: up{job="siyuan"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SiYuan knowledge base is down"
          description: "SiYuan has been down for more than 10 minutes"

      - alert: HighMemoryUsage
        expr: (1 - system_memory_available_mb / system_memory_total_mb) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90%"

      - alert: HighCPUUsage
        expr: system_cpu_percent > 95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 95%"

      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 7
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response times"
          description: "95th percentile response time > 7 seconds"
